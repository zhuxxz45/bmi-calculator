名称: 构建

触发条件:
 push:
    branches: [主, master]
 workflow_dispatch:

作业:
 linux:
    runs-on: ubuntu-latest
    步骤:
      - 使用: actions/checkout@v4

      - 名称: 设置 Python
        使用: actions/setup-python@v5
        with:
          Python 版本: '3.12'

      - 名称: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          pip install pyinstaller

      - 名称: 构建可执行文件
        运行: pyinstaller --onefile --windowed Bmi.py

      - 名称: 上传制品
        使用: actions/upload-artifact@v4
        with:
          名称: bmi-linux
          path: dist/Bmi

 macOS:
    运行环境: macos-latest
    步骤:
      - 使用: actions/checkout@v4

      - 名称: 设置 Python
        使用: actions/setup-python@v5
        with:
          Python 版本: '3.12'

      - 名称: 安装依赖
        运行: pip install pyinstaller

      - name: 构建可执行文件
        运行: pyinstaller --onefile --windowed Bmi.py

      - 名称: 上传制品
        使用: actions/upload-artifact@v4
        with:
          名称: bmi-macos
          path: dist/Bmi
