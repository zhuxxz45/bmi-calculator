name: Build BMI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    步骤:
      - 使用: actions/checkout@v4
      - 名称: 设置 Python
        使用: actions/setup-python@v5
        with:
          Python 版本: '3.12'
          缓存: 'pip'
      - 名称: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y python3-tk
          pip install pyinstaller
      - 名称: 构建
        运行: pyinstaller --onefile Bmi.py
      - 名称: 上传
        使用: actions/upload-artifact@v4
        with:
          名称: bmi-linux
          path: dist/Bmi

 macOS:
    运行环境: macos-latest
    步骤:
      - 使用: actions/checkout@v4
      - 名称: 设置 Python
        使用: actions/setup-python@v5
        with:
          Python 版本: '3.12'
          缓存: 'pip'
      - 名称: 安装依赖
        run: |
          brew install python-tk@3.12
          pip install pyinstaller
      - 名称: 构建
        运行: pyinstaller --onefile Bmi.py
      - 名称: 上传
        使用: actions/upload-artifact@v4
        with:
          名称: bmi-macos
          path: dist/Bmi
